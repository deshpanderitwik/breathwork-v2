name: Breathe
options:
  bundleIdPrefix: com.breathe
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  BreathCore:
    path: ../../swift/BreathCore

targets:
  Breathe:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: BreathCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.breathe.ios
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.10"
        DEVELOPMENT_TEAM: "443MNYHZG2"
        CODE_SIGN_STYLE: Automatic
