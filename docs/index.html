<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Breathe — essays</title>
<style>
  :root {
    --bg: #0e0f12;
    --panel: #16181d;
    --ink: #e8e9ec;
    --muted: #9aa0aa;
    --line: #2a2e36;
    --accent: #7cc4ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font: 16px/1.6 ui-sans-serif, -apple-system, system-ui, sans-serif; }
  main { max-width: 640px; margin: 0 auto; padding: 80px 24px 96px; }
  h1 { font-size: 32px; letter-spacing: -0.01em; margin: 0 0 8px; font-weight: 600; }
  .lede { color: var(--muted); margin: 0 0 56px; font-size: 17px; }
  ul { list-style: none; padding: 0; margin: 0; }
  li { padding: 18px 0; border-top: 1px solid var(--line); }
  li:last-child { border-bottom: 1px solid var(--line); }
  a { color: var(--ink); text-decoration: none; display: block; }
  a:hover { color: var(--accent); }
  .title { font-size: 18px; font-weight: 500; margin: 0 0 4px; }
  .blurb { color: var(--muted); font-size: 14px; margin: 0; }
  footer { margin-top: 56px; color: var(--muted); font-size: 13px; }
  footer a { display: inline; color: var(--muted); text-decoration: underline; }
  footer a:hover { color: var(--accent); }
</style>
</head>
<body>
<main>
  <h1>Breathe — essays</h1>
  <p class="lede">A few short pieces examining the breath from
    different points of view. Each is its own page; each can be read
    on its own.</p>

  <ul>
    <li>
      <a href="breath-and-body/">
        <p class="title">Breath &amp; body</p>
        <p class="blurb">What happens inside you when you breathe along
          to a metronome — sound to nerve to muscle to heart to mind.</p>
      </a>
    </li>
  </ul>

  <footer>
    <a href="https://github.com/deshpanderitwik/breathwork-v2">
      breathwork-v2 on GitHub
    </a>
  </footer>
</main>
</body>
</html>
